# parameter.yml — Environment-specific parameterization for fabric-cicd
#
# This file drives find_replace and key_value_replace rules so the same
# repository artifacts can be deployed to DEV, QA, and PROD workspaces
# without manual edits.
#
# Docs: https://microsoft.github.io/fabric-cicd/parameterization/
#
# ────────────────────────────────────────────────────────────────────
# INSTRUCTIONS:
#   1. Replace the placeholder IDs below with your real Fabric resource
#      IDs (workspace IDs, lakehouse IDs, connection strings, etc.).
#   2. The DEV values should match what is already in the exported
#      workspace/ folder (the Git-as-source-of-truth baseline).
#   3. QA and PROD values are the target equivalents in those environments.
# ────────────────────────────────────────────────────────────────────

# ── find_replace ─────────────────────────────────────────────────────
# Performs literal string replacement across all item definition files.
# Each entry has a find_value and a replace_value dict keyed by environment.
find_replace:
  - find_value: "20114644-bfa6-41f3-9981-2c30e0cf62eb"
    replace_value:
      DEV: "20114644-bfa6-41f3-9981-2c30e0cf62eb"
      QA: "461ed1ca-16e5-4374-bf04-0c8942525205"
      PROD: "a9fbd7ca-47c4-4c58-9ebe-d9f32fe98386"
      
  - find_value: "dev-sql-server.database.windows.net"
    replace_value:
      DEV: "zylcdhpgv7uezc6dy7d3ngcwyi-3gdumm5dyx3evknrtqblvv4zgq.database.fabric.microsoft.com"
      QA: "zylcdhpgv7uezc6dy7d3ngcwyi-3gdumm5dyx3evknrtqblvv4zgq.database.fabric.microsoft.com"
      PROD: "prod-sql-server.database.windows.net"

  # Direct Lake DatabaseQuery — workspace IDs per environment
  - find_value: "334687d9-c5a3-4af6-a9b1-9c02bad79934"
